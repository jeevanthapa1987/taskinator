<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Taskinator</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
   <header>
    <h1 class="page-title">Taskinator</h1>
    <p>Click the button below to add a new task!</p>
    <form id="task-form">
      <div class="form-group">
        <input type="text" name="task-name" placeholder="Enter Task Name" />
      </div>
      <div class="form-group">
        <select name="task-type" class="select-dropdown">
          <option value="" disabled selected>Pick a task type</option>
          <option value="Print">Print</option>
          <option value="Web">Web</option>
          <option value="Mobile">Mobile</option>
        </select>
      </div>
      <div class="form-group">
    <button class="btn" id="save-task" type="submit">Add Task</button>    
      </div>
      </form>
  </header>
  <main class="page-content">
    <section class="task-list-wrapper">
      <h2 class="list-title">Tasks To Do</h2>
      <ul class="task-list" id="tasks-to-do">
      </ul>
    </section>
  </main>
  <footer>
    &copy;2020 by Taskinator
  </footer>
    </body>
    <script>
var formEl=document.querySelector("#task-form");

var tasksToDoEl=document.querySelector("#tasks-to-do");

var taskFormHandler = function (event) {
  event.preventDefault();
  var taskNameInput = document.querySelector("input[name='task-name']").value;
  var taskTypeInput = document.querySelector("select[name='task-type']").value;

  var taskDatObj={
    name:taskNameInput,
    type:taskTypeInput
  }
  createTaskEl(taskDatObj);
  if(!taskNameInput || !taskTypeInput){
    alert("You need to fill out this form.");
    return false;
  }
  formEl.reset();
};
  var createTaskEl=function(taskDatObj){
    event.preventDefault();
  var taskNameInput = document.querySelector("input[name='task-name']").value;
  var taskTypeInput = document.querySelector("select[name='task-type']").value;

  // create list item
  var listItemEl = document.createElement("li");
  listItemEl.className = "task-item";

  // create div to hold task info and add to list item
  var taskInfoEl = document.createElement("div");
  taskInfoEl.className = "task-info";

  // add HTML content to div
  taskInfoEl.innerHTML = "<h3 class='task-name'>" + taskDatObj.name + "</h3><span class='task-type'>" + taskDatObj.type + "</span>";
  listItemEl.appendChild(taskInfoEl);

  // add entire list item to list
  tasksToDoEl.appendChild(listItemEl);  
  }
  formEl.addEventListener("submit",taskFormHandler);
  
    </script>   
    </html>
